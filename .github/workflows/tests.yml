name: Tests

on:
  push:
    branches: [ main, develop, project-reorganization ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ['3.10', '3.11']
      fail-fast: false  # Don't cancel other jobs if one fails
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install -r tests/requirements-test.txt
      
      - name: Run unit tests
        run: |
          pytest tests/unit/ -v --cov=backend --cov-report=xml --cov-report=term
      
      - name: Run integration tests
        run: |
          pytest tests/integration/ -v --tb=short
        continue-on-error: true
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
        continue-on-error: true

  lint:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black isort
      
      - name: Run flake8 (critical errors only)
        run: |
          # Only fail on critical errors (syntax errors, undefined names)
          flake8 backend/ --count --select=E9,F63,F7,F82 --show-source --statistics
        continue-on-error: false
      
      - name: Run flake8 (style warnings)
        run: |
          # Report style issues but don't fail
          flake8 backend/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
        continue-on-error: true
      
      - name: Check code formatting with black
        run: |
          black --check backend/ || echo "Code formatting issues found (non-blocking)"
        continue-on-error: true
      
      - name: Check import sorting with isort
        run: |
          isort --check-only backend/ || echo "Import sorting issues found (non-blocking)"
        continue-on-error: true

  security:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit safety
      
      - name: Run bandit security scan
        run: |
          bandit -r backend/ -ll -f json -o bandit-report.json || echo "Security issues found (non-blocking)"
        continue-on-error: true
      
      - name: Check dependencies for vulnerabilities
        run: |
          safety check --json || echo "Dependency vulnerabilities found (non-blocking)"
        continue-on-error: true
      
      - name: Upload security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: bandit-report.json
        continue-on-error: true

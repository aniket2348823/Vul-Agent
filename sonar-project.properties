sonar.projectKey=api-endpoint-scanner
sonar.projectName=API Endpoint Scanner
sonar.projectVersion=1.0

# Path to the source directories (frontend and backend)
sonar.sources=src,backend

# Exclude unnecessary files
sonar.exclusions=**/node_modules/**,**/dist/**,**/.pytest_cache/**,**/__pycache__/**,**/*.pdf,**/*.csv

# Python Coverage
sonar.python.version=3
sonar.python.xunit.reportPath=pytest-report.xml
sonar.python.coverage.reportPaths=coverage.xml

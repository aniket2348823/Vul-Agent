[tool:pytest]
testpaths = tests
python_paths = .
asyncio_mode = auto

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Coverage options
addopts = 
    --verbose
    --strict-markers
    --tb=short
    --cov=backend
    --cov-report=html
    --cov-report=term-missing

# Markers
markers =
    unit: Unit tests
    integration: Integration tests requiring external services
    e2e: End-to-end tests
    slow: Slow running tests (deselect with '-m "not slow"')
    asyncio: Async tests

# Ignore paths
norecursedirs = 
    .git
    .pytest_cache
    __pycache__
    node_modules
    dist
    build

[tool.pytest.ini_options]
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning

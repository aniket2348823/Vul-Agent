# Vigilagent Engagement Descriptor (Architecture §9, §10, §29.10)
# ----------------------------------------------------------------------------
# Human-facing engagement metadata and authorization record. The authoritative
# runtime scope/authorization is compiled from config/scope.yaml by ScopePolicy;
# this file documents the engagement context, authorization provenance, and
# operator-facing defaults. Keep the two in sync for a given engagement.
# ----------------------------------------------------------------------------

engagement:
  name: "unconfigured-engagement"
  client: ""
  # authorization: "none" => passive/recon only. "explicit" => active testing
  # permitted within the window. This MUST match engagement.authorization in
  # scope.yaml; ScopePolicy is the enforcing authority.
  authorization: none
  authorized_by: ""          # name/role of the person who authorized testing
  authorization_ref: ""      # ticket / contract / rules-of-engagement reference
  starts_at: ""              # ISO-8601, e.g. 2026-05-29T00:00:00Z
  ends_at: ""                # ISO-8601

# Default scan posture for new scans in this engagement (Architecture §9 risk
# levels). Intrusive actions remain approval-gated regardless of this value.
defaults:
  scan_mode: STANDARD        # PASSIVE_ONLY | STANDARD | AGGRESSIVE
  risk_level: standard       # passive | standard | aggressive | intrusive
  require_approval_for_state_changing: true

# Points of contact for approvals and incident notification.
contacts:
  approver: ""
  emergency: ""

notes: |
  This is a template. Copy and fill per engagement. No active testing runs
  until scope.yaml sets engagement.authorization: explicit AND the current time
  is inside the [starts_at, ends_at] window.
